<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS System</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="pos-container">
        <input type="text" id="barcode-input" class="barcode-input" autofocus>
        
        <header>
            <h1>Point of Sale System</h1>
            <div class="header-info">
                <div class="usb-status" id="usb-status">
                    <span class="status-dot"></span>
                    <span class="status-text">Scanner: Not Connected</span>
                </div>
                <span id="current-date"></span>
                <span id="current-time"></span>
            </div>
        </header>

        <div class="main-content">
            <div class="products-section">
                <div class="search-bar">
                    <input type="text" id="search" placeholder="Search products...">
                </div>
                <div class="categories">
                    <button class="category-btn active" data-category="all">All</button>
                    <button class="category-btn" data-category="food">Food</button>
                    <button class="category-btn" data-category="drinks">Drinks</button>
                    <button class="category-btn" data-category="snacks">Snacks</button>
                </div>
                <div class="products-grid" id="products-grid">
                </div>
            </div>

            <div class="cart-section">
                <div class="cart-header">
                    <h2>Order Summary</h2>
                    <button id="clear-cart" class="clear-btn">Clear All</button>
                </div>
                <div class="cart-items" id="cart-items">
                    <p class="empty-cart">Your cart is empty</p>
                </div>
                <div class="cart-totals">
                    <div class="subtotal">
                        <span>Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="tax">
                        <span>Tax (8%):</span>
                        <span id="tax">$0.00</span>
                    </div>
                    <div class="total">
                        <span>Total:</span>
                        <span id="total">$0.00</span>
                    </div>
                </div>
                <div class="cart-actions">
                    <button id="checkout-btn" class="checkout-btn" disabled>Process Payment</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
